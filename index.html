<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Military Asset Guesser</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">Military Asset Guesser</h1>
      <div class="stats" id="sp-stats">
        <div class="stat">
          <span class="stat-label">Streak</span>
          <span id="streak" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Best</span>
          <span id="high-score" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Accuracy</span>
          <span id="accuracy" class="stat-value">0%</span>
        </div>
      </div>
      <div class="mp-stats hidden" id="mp-stats-header">
        <div class="mp-round">Round <span id="mp-round-num">1</span> / <span id="mp-round-total">10</span></div>
      </div>
      <button id="btn-leaderboard" class="btn btn-secondary">Leaderboard</button>
    </header>

    <main class="game">
      <div class="mp-hud hidden" id="mp-hud">
        <div class="mp-timer-wrap"><div id="mp-timer-bar" class="mp-timer-bar"></div></div>
        <div class="mp-scores" id="mp-scores"></div>
      </div>

      <div class="lives-bar" id="lives-bar" aria-label="Lives">
        <span class="life"></span><span class="life"></span><span class="life"></span><span class="life"></span><span class="life"></span>
      </div>

      <div class="image-stage-wrap">
        <div class="image-stage">
          <img id="asset-image" alt="Military asset" />
          <span id="category-badge" class="category-badge"></span>
        </div>
      </div>

      <div class="hints" id="hints"></div>

      <div class="controls">
        <div class="autocomplete-wrap">
          <input
            id="guess-input"
            type="text"
            placeholder="Type asset name..."
            autocomplete="off"
            aria-label="Guess input"
            aria-autocomplete="list"
            aria-controls="autocomplete-list"
          />
          <ul id="autocomplete-list" class="autocomplete-list" role="listbox"></ul>
        </div>
        <button id="submit-btn" class="btn btn-primary">Submit Guess</button>
      </div>

      <div class="history" id="history" aria-live="polite"></div>
    </main>
  </div>

  <!-- Main Menu -->
  <div id="main-menu" class="setup-overlay open">
    <div class="setup-card" style="text-align:center;">
      <h2 class="setup-title">Military Asset Guesser</h2>
      <button id="btn-sp" class="btn btn-primary" style="width: 100%; margin-bottom: 12px;">Single Player</button>
      <button id="btn-mp" class="btn btn-secondary" style="width: 100%;">Multiplayer</button>
    </div>
  </div>

  <!-- Setup Overlay -->
  <div id="setup" class="setup-overlay">
    <div class="setup-card">
      <h2 class="setup-title">Game Setup</h2>

      <div class="setup-section">
        <div class="setup-label">Mode</div>
        <div class="radio-group">
          <label class="radio-chip"><input type="radio" name="mode" value="classic" checked /> Classic</label>
          <label class="radio-chip"><input type="radio" name="mode" value="hard" /> Hard</label>
          <label class="radio-chip"><input type="radio" name="mode" value="sudden" /> Sudden Death</label>
        </div>
      </div>

      <div class="setup-section">
        <div class="setup-label">Categories</div>
        <div class="chip-group" id="category-chips">
          <button type="button" class="chip" data-value="Land">Land</button>
          <button type="button" class="chip" data-value="Air">Air</button>
          <button type="button" class="chip" data-value="Sea">Sea</button>
          <button type="button" class="chip" data-value="Infantry">Infantry</button>
        </div>
      </div>

      <div class="setup-section">
        <div class="setup-label">Eras</div>
        <div class="chip-group" id="era-chips">
          <button type="button" class="chip" data-value="World War II">World War II</button>
          <button type="button" class="chip" data-value="Cold War">Cold War</button>
          <button type="button" class="chip" data-value="Post-Cold War">Post-Cold War</button>
        </div>
      </div>

      <div class="setup-section">
        <label class="toggle-row">
          <input type="checkbox" id="hidden-mode-toggle" />
          <span class="toggle-slider"></span>
          <span class="toggle-label">Hidden Mode (blurred image)</span>
        </label>
      </div>

      <div id="setup-warning" class="setup-warning hidden"></div>

      <button id="start-btn" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Start Game</button>
    </div>
  </div>

  <!-- Multiplayer Menu -->
  <div id="mp-menu" class="setup-overlay">
    <div class="setup-card" style="max-width: 420px;">
      <h2 class="setup-title">Multiplayer</h2>
      <div class="setup-section">
        <label style="display: block; margin-bottom: 6px; font-weight: 600;">Your Name</label>
        <input type="text" id="mp-name" placeholder="Enter your name" maxlength="16" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface, var(--panel-2)); color: var(--text);" />
      </div>
      <div class="setup-section">
        <label style="display: block; margin-bottom: 6px; font-weight: 600;">Lobby Keyword</label>
        <input type="text" id="mp-keyword" placeholder="e.g. gg" maxlength="12" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface, var(--panel-2)); color: var(--text);" />
      </div>
      <div id="mp-error" class="setup-warning hidden"></div>
      <div style="display: flex; gap: 10px;">
        <button id="mp-back" class="btn btn-secondary" style="flex: 1;">Back</button>
        <button id="mp-join" class="btn btn-primary" style="flex: 1;">Join / Create</button>
      </div>
    </div>
  </div>

  <!-- Multiplayer Lobby -->
  <div id="mp-lobby" class="setup-overlay">
    <div class="setup-card" style="max-width: 560px;">
      <h2 class="setup-title">Lobby <span id="lobby-keyword-display" style="opacity: .7; font-size: .7em;"></span></h2>
      <div id="lobby-players" class="lobby-players"></div>

      <div id="host-settings" class="hidden">
        <div class="setup-section" style="margin-top: 12px;">
          <div class="setup-label">Categories</div>
          <div class="chip-group" id="mp-category-chips">
            <button type="button" class="chip" data-value="Land">Land</button>
            <button type="button" class="chip" data-value="Air">Air</button>
            <button type="button" class="chip" data-value="Sea">Sea</button>
            <button type="button" class="chip" data-value="Infantry">Infantry</button>
          </div>
        </div>

        <div class="setup-section">
          <div class="setup-label">Eras</div>
          <div class="chip-group" id="mp-era-chips">
            <button type="button" class="chip" data-value="World War II">World War II</button>
            <button type="button" class="chip" data-value="Cold War">Cold War</button>
            <button type="button" class="chip" data-value="Post-Cold War">Post-Cold War</button>
          </div>
        </div>

        <div class="setup-section" style="display: flex; gap: 12px;">
          <div style="flex: 1;">
            <div class="setup-label">Rounds</div>
            <div class="radio-group">
              <label class="radio-chip"><input type="radio" name="mp-rounds" value="5" /> 5</label>
              <label class="radio-chip"><input type="radio" name="mp-rounds" value="10" checked /> 10</label>
              <label class="radio-chip"><input type="radio" name="mp-rounds" value="15" /> 15</label>
            </div>
          </div>
          <div style="flex: 1;">
            <div class="setup-label">Time (sec)</div>
            <div class="radio-group">
              <label class="radio-chip"><input type="radio" name="mp-time" value="15" /> 15</label>
              <label class="radio-chip"><input type="radio" name="mp-time" value="30" checked /> 30</label>
              <label class="radio-chip"><input type="radio" name="mp-time" value="60" /> 60</label>
            </div>
          </div>
        </div>
      </div>

      <div id="lobby-actions" style="display: flex; gap: 10px; margin-top: 16px;">
        <button id="lobby-leave" class="btn btn-secondary" style="flex: 1;">Leave</button>
        <button id="lobby-ready" class="btn btn-primary" style="flex: 1;">Ready</button>
        <button id="lobby-start" class="btn btn-primary hidden" style="flex: 1;">Start Game</button>
      </div>
    </div>
  </div>

  <!-- Game Over / Generic Modal -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <h2 id="modal-title" class="modal-title"></h2>
      <p id="modal-body" class="modal-body"></p>
      <div class="btn-row" style="justify-content: center;">
        <button id="modal-action" class="btn btn-primary"></button>
        <button id="modal-menu" class="btn btn-secondary">Menu</button>
      </div>
    </div>
  </div>

  <!-- Leaderboard Modal -->
  <div id="leaderboard-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="lb-title">
    <div class="modal-card" style="max-width: 520px;">
      <h2 id="lb-title" class="modal-title">Leaderboard</h2>

      <div class="lb-tabs">
        <button class="lb-tab active" data-tab="top10">Top 10</button>
        <button class="lb-tab" data-tab="cats">Category Bests</button>
      </div>

      <div id="lb-top10" class="lb-panel">
        <div id="lb-list" class="lb-list"></div>
      </div>

      <div id="lb-cats" class="lb-panel hidden">
        <div id="lb-cat-grid" class="lb-cat-grid"></div>
      </div>

      <div class="btn-row" style="justify-content: center; margin-top: 18px;">
        <button id="lb-close" class="btn btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <!-- Multiplayer Round / Game Result Modal -->
  <div id="mp-result-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="mp-result-title">
    <div class="modal-card" style="max-width: 480px;">
      <h2 id="mp-result-title" class="modal-title">Round Over</h2>
      <p id="mp-result-body" class="modal-body"></p>
      <div id="mp-result-scores" class="mp-result-scores"></div>
      <div class="btn-row" style="justify-content: center; margin-top: 14px;">
        <button id="mp-result-action" class="btn btn-primary">Next Round</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>
  <script src="js/db.js"></script>
  <script src="js/game.js"></script>
  <script src="js/multiplayer.js"></script>
</body>
</html>
